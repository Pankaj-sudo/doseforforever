<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <title>Dose of Forever — Premium Research Peptides Philippines</title>
    
    <!-- Always boot in light theme by default -->
    <script>
      try {
        localStorage.removeItem('theme');
      } catch (e) {}
      document.documentElement.classList.remove('dark');
    </script>
    
    <!-- Premium SEO & Meta Tags -->
    <meta name="description" content="Scientific-grade premium research peptides in the Philippines. HPLC-certified, sterile-filtered, and vacuum-sealed for analytical excellence. Fast Local Lalamove & Grab Shipping." />
    <meta name="keywords" content="peptides, research peptides, peptides philippines, BPC-157, Semaglutide, Retatrutide, GHK-Cu, NAD+, biohacking, HPLC certified" />
    <meta name="author" content="Dose of Forever Laboratory" />
    <meta name="theme-color" content="#f8fafc" />
    
    <!-- Open Graph / Social Media Sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Dose of Forever — Premium Research Peptides Philippines" />
    <meta property="og:description" content="HPLC-certified, medical-grade research standard peptides. Reconstitution-ready, sterile-filtered, vacuum-sealed vials for laboratory research." />
    <meta property="og:site_name" content="Dose of Forever" />
    <meta property="og:url" content="https://peptide.ph" />
    
    <!-- Modern Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%230d9488' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M10 2v7.31M14 2v7.31v0M4 22h16M10 9.3a1.5 1.5 0 1 0 4 0M14 9.32a6.32 6.32 0 0 1 5.37 5.9C19.74 18.6 17.5 22 12 22S4.26 18.6 4.63 15.22a6.32 6.32 0 0 1 5.37-5.92'/%3E%3C/svg%3E" />

    <!-- Google Font Imports -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Critical CSS for Instant App Boot Preloader -->
    <style>
      :root {
        --bg-color: #f8fafc;
        --text-color: #0f172a;
        --teal-primary: #0d9488;
        --loader-bg: #e2e8f0;
        --preloader-bg: #f8fafc;
      }
      .dark {
        --bg-color: #0f172a;
        --text-color: #f8fafc;
        --loader-bg: #1e293b;
        --preloader-bg: #0f172a;
      }
      html, body {
        margin: 0;
        padding: 0;
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        height: 100%;
        overflow-x: hidden;
      }
      .preloader-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: var(--preloader-bg);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 99999;
        transition: opacity 0.5s ease;
      }
      .flask-animation {
        width: 80px;
        height: 80px;
        position: relative;
        margin-bottom: 24px;
        animation: float 2.5s ease-in-out infinite;
      }
      .flask-svg {
        stroke: var(--teal-primary);
        filter: drop-shadow(0 0 8px var(--teal-primary));
        animation: pulse 1.5s ease-in-out infinite alternate;
      }
      .loader-bar-wrap {
        width: 140px;
        height: 3px;
        background: var(--loader-bg);
        border-radius: 99px;
        overflow: hidden;
        position: relative;
        margin-top: 8px;
      }
      .loader-bar-fill {
        height: 100%;
        width: 50%;
        background: linear-gradient(90deg, #0d9488, #14b8a6, #0d9488);
        border-radius: 99px;
        animation: load-slide 1.5s infinite linear;
        box-shadow: 0 0 6px #14b8a6;
      }
      .loading-text {
        font-family: monospace;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #94a3b8;
        opacity: 0.8;
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-8px) rotate(2deg); }
      }
      @keyframes pulse {
        from { opacity: 0.8; filter: drop-shadow(0 0 4px var(--teal-primary)); }
        to { opacity: 1; filter: drop-shadow(0 0 12px #14b8a6); }
      }
      @keyframes load-slide {
        0% { left: -50%; }
        100% { left: 100%; }
      }
    </style>
  </head>
  <body>
    <!-- Premium Interactive Preloader (Unmounts dynamically upon React hydration) -->
    <div id="preloader" class="preloader-overlay">
      <div class="flask-animation">
        <svg class="flask-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="100%" height="100%">
          <path d="M10 2v7.31" />
          <path d="M14 2v7.31" />
          <path d="M4 22h16" />
          <path d="M10 9.3a1.5 1.5 0 1 0 4 0" />
          <path d="M14 9.32a6.32 6.32 0 0 1 5.37 5.9C19.74 18.6 17.5 22 12 22S4.26 18.6 4.63 15.22a6.32 6.32 0 0 1 5.37-5.92" />
          <circle cx="9" cy="15" r="1" fill="#0d9488" opacity="0.6" />
          <circle cx="15" cy="18" r="1.5" fill="#0d9488" opacity="0.6" />
          <circle cx="11" cy="19" r="1" fill="#0d9488" opacity="0.6" />
        </svg>
      </div>
      <div class="loading-text">Dose of Forever Console</div>
      <div class="loader-bar-wrap">
        <div class="loader-bar-fill"></div>
      </div>
    </div>

    <!-- Main React Mount Pivot -->
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <!-- Preloader Auto-Fadeout once DOM is hydrated -->
    <script>
      window.addEventListener('DOMContentLoaded', () => {
        // Fallback fade out in case App.tsx takes longer to run
        setTimeout(() => {
          const preloader = document.getElementById('preloader');
          if (preloader) {
            preloader.style.opacity = '0';
            setTimeout(() => {
              preloader.remove();
            }, 500);
          }
        }, 1500);
      });
    </script>
  </body>
</html>
