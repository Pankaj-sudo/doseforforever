    <!-- Google Font Imports -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Critical CSS for Instant App Boot Preloader -->
    <style>
      :root {
        --dark-bg: #f7f5f0;
        --burgundy-primary: #7a223e;
        --burgundy-glow: rgba(122, 34, 62, 0.25);
      }
      html, body {
        margin: 0;
        padding: 0;
        background-color: var(--dark-bg);
        color: #292d35;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        height: 100%;
        overflow-x: hidden;
      }
      .preloader-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #f7f5f0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 99999;
        transition: opacity 0.5s ease;
      }
      .flask-animation {
        width: 80px;
        height: 80px;
        position: relative;
        margin-bottom: 24px;
        animation: float 2.5s ease-in-out infinite;
      }
      .flask-svg {
        stroke: var(--burgundy-primary);
        filter: drop-shadow(0 0 8px var(--burgundy-primary));
        animation: pulse 1.5s ease-in-out infinite alternate;
      }
      .loader-bar-wrap {
        width: 140px;
        height: 3px;
        background: #e2e8f0;
        border-radius: 99px;
        overflow: hidden;
        position: relative;
        margin-top: 8px;
      }
      .loader-bar-fill {
        height: 100%;
        width: 50%;
        background: linear-gradient(90deg, #7a223e, #b5496a, #7a223e);
        border-radius: 99px;
        animation: load-slide 1.5s infinite linear;
        box-shadow: 0 0 6px #b5496a;
      }
      .loading-text {
        font-family: monospace;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #718096;
        opacity: 0.8;
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-8px) rotate(2deg); }
      }
      @keyframes pulse {
        from { opacity: 0.8; filter: drop-shadow(0 0 4px var(--burgundy-primary)); }
        to { opacity: 1; filter: drop-shadow(0 0 12px #b5496a); }
      }
      @keyframes load-slide {
        0% { left: -50%; }
        100% { left: 100%; }
      }
    </style>
  </head>
  <body>
    <!-- Premium Interactive Preloader (Unmounts dynamically upon React hydration) -->
    <div id="preloader" class="preloader-overlay">
      <div class="flask-animation">
        <svg class="flask-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="100%" height="100%">
          <path d="M10 2v7.31" />
          <path d="M14 2v7.31" />
          <path d="M4 22h16" />
          <path d="M10 9.3a1.5 1.5 0 1 0 4 0" />
          <path d="M14 9.32a6.32 6.32 0 0 1 5.37 5.9C19.74 18.6 17.5 22 12 22S4.26 18.6 4.63 15.22a6.32 6.32 0 0 1 5.37-5.92" />
          <circle cx="9" cy="15" r="1" fill="#7a223e" opacity="0.6" />
          <circle cx="15" cy="18" r="1.5" fill="#7a223e" opacity="0.6" />
          <circle cx="11" cy="19" r="1" fill="#7a223e" opacity="0.6" />
        </svg>
      </div>
      <div class="loading-text">peptalk.ph Console</div>
      <div class="loader-bar-wrap">
        <div class="loader-bar-fill"></div>
      </div>
    </div>

    <!-- Main React Mount Pivot -->
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <!-- Preloader Auto-Fadeout once DOM is hydrated -->
    <script>
      window.addEventListener('DOMContentLoaded', () => {
        // Fallback fade out in case App.tsx takes longer to run
        setTimeout(() => {
          const preloader = document.getElementById('preloader');
          if (preloader) {
            preloader.style.opacity = '0';
            setTimeout(() => {
              preloader.remove();
            }, 500);
          }
        }, 1500);
      });
    </script>
  </body>
</html>
